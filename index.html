<!DOCTYPE html>
<html>
  <head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Easy Fundx</title>
    <link rel='stylesheet' href='style.css'>
  </head>
  <body>
    <div class='topbar'>
      <div class='container'>
        <img src='img/logo.png' alt='logo' class='logo'/>
      </div>
    </div>
    <!-- content -->
    <div class='container'>
      <div class='cards'>
        <!-- card -->
        <div class='card-spacing'>
        <div class='card'>
          <div class='card-cover'>
            <img src="https://picsum.photos/350/200?img=1" alt="random image"/>
          </div>
          <div class='card-body'>
            <div class='card-description'>
              <div class='card-title'>
                Feira de ciências
              </div>
              <div class='card-owner'>
                por <strong>Brunoid, o Implicante</strong>
              </div>
            </div>
            <div class='card-progress'>
              <div class='card-money'>
                R$ 0 atingidos
              </div>
              <div class='card-bar'>
                <div class='card-bar-value' style='width: 65%'></div>
              </div>
              <div class='card-info'>
                <spam>0%</spam>
                <spam>iniciado há 13 dias</spam>
              </div>
            </div>
          </div>
        </div>
        </div>
        <!-- /card -->

        <!-- card -->
        <div class='card-spacing'>
        <div class='card'>
          <div class='card-cover'>
            <img src="https://picsum.photos/350/200?img=2" alt="random image"/>
          </div>
          <div class='card-body'>
            <div class='card-description'>
              <div class='card-title'>
                Campanha de título um pouco maior
              </div>
              <div class='card-owner'>
                por <strong>Robert Cop 2</strong>
              </div>
            </div>
            <div class='card-progress'>
              <div class='card-money'>
                R$ 0 atingidos
              </div>
              <div class='card-bar'>
                <div class='card-bar-value' style='width: 15%'></div>
              </div>
              <div class='card-info'>
                <spam>0%</spam>
                <spam>iniciado há 13 dias</spam>
              </div>
            </div>
          </div>
        </div>
        </div>

        <!-- card -->
        <div class='card-spacing'>
        <div class='card'>
          <div class='card-cover'>
            <img src="https://picsum.photos/350/200?img=3" alt="random image"/>
          </div>
          <div class='card-body'>
            <div class='card-description'>
              <div class='card-title'>
                Campanha da Carol
              </div>
              <div class='card-owner'>
                por <strong>Ane Caroline</strong>
              </div>
            </div>
            <div class='card-progress'>
              <div class='card-money'>
                R$ 0 atingidos
              </div>
              <div class='card-bar'>
                <div class='card-bar-value' style='width: 75%'></div>
              </div>
              <div class='card-info'>
                <spam>0%</spam>
                <spam>iniciado há 13 dias</spam>
              </div>
            </div>
          </div>
        </div>
        </div>
        <!-- /card -->



      </div>
    </div>
  </body>
</html>
